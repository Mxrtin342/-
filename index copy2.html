<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>เป็นแฟนกันนะ 💖</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: "Prompt", sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#ff9ecf,#ffd6ec);
      overflow:hidden;
    }

    .card{
      background:white;
      padding:40px 30px;
      border-radius:30px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
      width:320px;
      animation:fadeIn 1.5s ease;
      position:relative;
      z-index:2;
    }

    h1{
      color:#ff4f93;
      font-size:30px;
      margin-bottom:15px;
    }

    p{
      color:#555;
      margin-bottom:25px;
      font-size:18px;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:15px;
    }

    button{
      border:none;
      padding:12px 24px;
      border-radius:50px;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    .yes{
      background:#ff4f93;
      color:white;
    }

    .yes:hover{
      transform:scale(1.1);
      background:#ff2d7a;
    }

    .no{
      background:#eee;
      color:#444;
      position:relative;
    }

    .heart{
      position:absolute;
      color:#ff4f93;
      font-size:20px;
      animation:float 5s linear infinite;
      opacity:0.7;
    }

    @keyframes float{
      0%{
        transform:translateY(100vh) scale(0);
      }
      100%{
        transform:translateY(-120px) scale(1.5);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>เป็นแฟนกันมั้ยคั้บบ 💕</h1>
    <p>
      เราก็คุยกันมานานแล้วน้าาา<br>ลองเป็นแฟนกันมั้ย 🥺
    </p>

    <div class="buttons">
      <button class="yes" onclick="love()">เป็นน 💝</button>
      <button class="no" onmouseover="runAway(this)">ไม่เป็นน 💔</button>
    </div>
  </div>

  <script>
    function love(){
      document.body.innerHTML = `
        <div style="
          height:100vh;
          display:flex;
          justify-content:center;
          align-items:center;
          flex-direction:column;
          background:linear-gradient(135deg,#ff9ecf,#ffd6ec);
          color:white;
          text-align:center;
        ">
          <h1 style="font-size:55px;">เย้ 💗</h1>
          <h2 style="margin-top:10px;">รักน้าาา ไอ่หมูของเค้าา 🥰</h2>
        </div>
      `;
    }

    function runAway(btn){
      const x = Math.random() * 300 - 150;
      const y = Math.random() * 300 - 150;

      btn.style.transform = `translate(${x}px, ${y}px)`;
    }

    // หัวใจลอย
    setInterval(() => {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "💗";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = Math.random() * 20 + 15 + "px";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }, 300);
  </script>

</body>
</html>
