<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be My Girlfriend?</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgb(0, 0, 0);
    overflow:hidden;
    font-family:Arial, sans-serif;
}

.container{
    text-align:center;
    z-index:2;
}

h1{
    color:#ffd1e6;
    font-size:55px;
    margin-bottom:30px;

    text-shadow:
    0 0 5px #ff69b4,
    0 0 10px #ff69b4,
    0 0 20px #ff69b4,
    0 0 40px #ff69b4;
}

p{
    color:white;
    font-size:22px;
    margin-bottom:40px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
}

button{
    padding:15px 35px;
    font-size:22px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

#yes{
    background:#ff26c9;
    color:white;

    box-shadow:
    0 0 10px #ff69b4,
    0 0 30px #ff69b4;
}

#yes:hover{
    transform:scale(1.1);
}

#no{
    background:white;
    color:rgb(0, 0, 0);
    position:absolute;
}

.heart{
    position:absolute;
    color:#ff69b4;
    animation:float 5s linear infinite;
    user-select:none;
}

@keyframes float{

    0%{
        transform:translateY(100vh) scale(0);
        opacity:0;
    }

    50%{
        opacity:1;
    }

    100%{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
    }
}

#message{
    margin-top:40px;
    font-size:35px;
    color:#ffb6d9;
    display:none;

    text-shadow:
    0 0 5px #ff69b4,
    0 0 10px #ff69b4,
    0 0 20px #ff69b4;
}

</style>
</head>

<body>

<div class="container">

    <h1>❤️ เป็นแฟนกันมั้ยคั้บบ ❤️</h1>

    <p>เราก็คุยกันมานานแล้วน้าาลองเป็นแฟนกันมั้ย 💕</p>

    <div class="buttons">

        <button id="yes">เป็นน 💖</button>

        <button id="no">ไม่เป็นน 💔</button>

    </div>

    <div id="message">
        เย้ 💞 รักนะะะ 💖
    </div>

</div>

<script>

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const message = document.getElementById("message");

// ปุ่มไม่ วิ่งหนี
noBtn.addEventListener("mouseover", () => {

    const x = Math.random() * (window.innerWidth - 100);

    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";

    noBtn.style.top = y + "px";

});


// กดตกลง
yesBtn.addEventListener("click", () => {

    message.style.display = "block";

    createHearts();

});


// สร้างหัวใจลอย
function createHearts(){

    setInterval(() => {

        const heart = document.createElement("div");

        heart.classList.add("heart");

        heart.innerHTML = "💗";

        heart.style.left = Math.random() * 100 + "vw";

        heart.style.fontSize = Math.random() * 30 + 20 + "px";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);

    }, 200);

}

</script>

</body>
</html>
